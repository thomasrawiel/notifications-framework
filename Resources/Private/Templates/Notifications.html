<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module"/>
<f:section name="Headline">
    <h1><f:translate key="{module.title}">{module.title}</f:translate></h1>
</f:section>
<f:section name="Content">
    <f:render section="Headline" arguments="{_all}"/>
    <div style="margin-bottom:24px" class="infolist-container">
        <div class="infolist">
            <div class="infolist-content">
                <div class="table-fit mb-0">
                    <f:render partial="Filter" arguments="{module:module,demand:demand,filters:filters}" />
                    <table class="table table-striped table-hover">
                        <tbody>
                        <f:for as="notification" each="{paginator.paginatedItems}">
                            <f:render partial="Notification/Row" arguments="{_all}"/>
                        </f:for>
                        </tbody>
                    </table>
                    <f:render partial="Pagination" arguments="{_all}"/>
                </div>
            </div>
        </div>
    </div>
</f:section>
</html>
