<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<form method="post">
    <div class="row row-cols-auto align-items-start">
        <div class="col">
            <core:icon identifier="actions-filter" size="medium"/>
            Filters:
        </div>
        <div class="col">
            <div class="form-group">
                <label class="form-label">Type</label>
                <select name="filter[type]" class="form-select" onchange="javascript:this.form.submit()">
                    <option value="">Show all</option>
                    <f:for as="item" each="{filters.type}">
                        <option value="{item.value}" {f:if(condition:'{demand.filter.type}=={item.value}',then:'selected')}>
                        <f:translate key="{item.label}">{item.label}</f:translate>
                        </option>
                    </f:for>
                </select>
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label class="form-label">Valid</label>
                <select name="filter[valid]" class="form-select" onchange="javascript:this.form.submit()">
                    <option value="">Show all</option>
                    <f:for as="item" each="{filters.valid}">
                        <option value="{item}" {f:if(condition:'{demand.filter.valid}=={item}',then:'selected')}>
                        {item}
                        </option>
                    </f:for>
                </select>
            </div>
        </div>
        <div class="col">
            <a href="{f:be.uri(route: module.identifier, parameters: '{id:selectedPageUID,sortField:\'\',sortDirection:\'\',filter:\'\'}')}">Reset</a>
        </div>
    </div>
</form>
</html>
