<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      xmlns:nf="http://typo3.org/ns/TRAW/NotificationsFramework/ViewHelpers"
      data-namespace-typo3-fluid="true">
<tr class="">
    <td>
        <a href="{f:be.uri(route: 'notifications_configurations.detail', parameters:'{configuration:configuration.uid,id:demand.pid}')}">
            {nf:statusIcon(configuration:configuration) -> f:format.raw()}


        <core:icon identifier="actions-search"/>
        {configuration.uid}
        </a>




    </td>
    <f:if condition="{showPidColumn}">
        <td>
            {configuration.pid}
        </td>
    </f:if>
    <td>
        <f:format.date date="{configuration.crdate}" pattern="yyyy-MM-dd HH:mm:ss"/>
    </td>
    <td>
        <f:translate
            key="LLL:EXT:notifications_framework/Resources/Private/Language/locallang_tca.xlf:configuration.type.{configuration.type}"/>
    </td>

    <td>
        <a href="{f:be.uri(route: 'notifications_configurations.detail', parameters:'{configuration:configuration.uid,id:demand.pid}')}">
            <core:icon identifier="actions-search" size="small"></core:icon>
            <f:format.crop maxCharacters="30">{configuration.title}</f:format.crop>
        </a>

    </td>
    <td></td>
    <td class="{nf:validClass(value:configuration.valid,configuration:configuration)}">
        {nf:validIcon(value: configuration.valid, configuration:configuration) -> f:format.raw()}
    </td>

    <td>
{configuration.audience}
    </td>
</tr>
</html>
